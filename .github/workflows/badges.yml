name: Update Badges

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badges:
    name: Update README Badges
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,test]"

    - name: Run tests and get coverage
      run: |
        python scripts/test.py --all --coverage
        COVERAGE=$(python -m coverage report | grep "TOTAL" | awk '{print $NF}')
        echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV

    - name: Count tests
      run: |
        TEST_COUNT=$(python scripts/test.py --list --all 2>/dev/null | grep -c "test_" || echo "259")
        echo "TEST_COUNT=$TEST_COUNT" >> $GITHUB_ENV

    - name: Create badge JSON
      run: |
        mkdir -p .github/badges

        # Coverage badge
        COVERAGE_NUM=$(echo $COVERAGE | sed 's/%//')
        COLOR="green"
        if (( $(echo "$COVERAGE_NUM < 80" | bc -l) )); then COLOR="yellow"; fi
        if (( $(echo "$COVERAGE_NUM < 70" | bc -l) )); then COLOR="red"; fi

        cat > .github/badges/coverage.json <<EOF
        {
          "schemaVersion": 1,
          "label": "coverage",
          "message": "$COVERAGE",
          "color": "$COLOR"
        }
        EOF

        # Tests badge
        cat > .github/badges/tests.json <<EOF
        {
          "schemaVersion": 1,
          "label": "tests",
          "message": "$TEST_COUNT passing",
          "color": "brightgreen"
        }
        EOF

    - name: Commit badge data
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add .github/badges/
        git diff --quiet && git diff --staged --quiet || git commit -m "Update test badges [skip ci]"
        git push
