name: Nightly Full Test Suite

on:
  schedule:
    # Run at 2 AM UTC every day
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  full-test-suite:
    name: Full Test Suite (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ['3.12']
        os: [ubuntu-latest, macos-latest]
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[all]"

    - name: Install Ollama (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        ollama serve &
        sleep 5
        ollama pull qwen3

    - name: Install Ollama (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install ollama
        ollama serve &
        sleep 5
        ollama pull qwen3

    - name: Run full test suite
      run: |
        python scripts/test.py --all --coverage

    - name: Generate coverage report
      run: |
        coverage report
        coverage html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        files: .coverage
        flags: ${{ matrix.os }}-py${{ matrix.python-version }}
        name: ${{ matrix.os }}-${{ matrix.python-version }}

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.python-version }}
        path: |
          htmlcov/
          .coverage
          .pytest_cache/

  stress-test:
    name: Stress Test (Long-running simulations)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[all]"

    - name: Install Ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh
        ollama serve &
        sleep 5
        ollama pull qwen3

    - name: Run stress tests
      run: |
        # Run e2e tests with extended iterations
        python scripts/test.py --e2e -v

    - name: Check memory usage
      run: |
        # Monitor peak memory usage during tests
        echo "Memory check placeholder - would monitor resource usage"

  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[all]"
        pip install pytest-benchmark

    - name: Run benchmarks
      run: |
        # Placeholder for future benchmark tests
        echo "Benchmarks would run here"
        python scripts/test.py --quick

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: .benchmarks/

  test-report:
    name: Generate Nightly Report
    runs-on: ubuntu-latest
    needs: [full-test-suite, stress-test, benchmark]
    if: always()

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4

    - name: Generate summary report
      run: |
        echo "# Nightly Test Report - $(date +%Y-%m-%d)" > report.md
        echo "" >> report.md
        echo "## Test Results" >> report.md
        echo "" >> report.md
        echo "- Full Test Suite: ${{ needs.full-test-suite.result }}" >> report.md
        echo "- Stress Test: ${{ needs.stress-test.result }}" >> report.md
        echo "- Benchmarks: ${{ needs.benchmark.result }}" >> report.md
        echo "" >> report.md
        echo "## Artifacts" >> report.md
        echo "- Test results and coverage reports attached to this workflow run" >> report.md
        echo "" >> report.md
        echo "[View full run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> report.md

    - name: Create issue on failure
      if: needs.full-test-suite.result == 'failure' || needs.stress-test.result == 'failure'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('report.md', 'utf8');

          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `Nightly Test Failure - ${new Date().toISOString().split('T')[0]}`,
            body: report,
            labels: ['test-failure', 'nightly']
          });

    - name: Upload report
      uses: actions/upload-artifact@v4
      with:
        name: nightly-report
        path: report.md
